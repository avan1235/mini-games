name: Assemble Desktop Distributions

on:
  push:
    branches:
      - 'master'
      - 'dev/**'
    paths-ignore:
      - '.github/workflows/assemble-android.yml'
      - '.github/workflows/deploy-server.yml'
      - 'android-app/**'
      - 'dev-env/**'
      - 'server/**'
      - 'README.md'

jobs:
  build:
    strategy:
      matrix:
        platform: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout to push branch
        uses: actions/checkout@master
        with:
          ref: ${{ github.ref }}
      - name: Set up JDK 15
        uses: actions/setup-java@v1
        with:
          java-version: 15
      - name: Build distribution file
        if: job.status == 'success'
        run: |
          export GRADLE_USER_HOME=$(pwd)/.gradle
          export DESKTOP_CLIENT_API_HOST=mini-games-api.herokuapp.com
          export REST_CLIENT_API_SCHEME=https
          export WEBSOCKET_CLIENT_API_SCHEME=wss
          chmod +x ./gradlew
          ./gradlew desktop-app:package desktop-app:packageUberJarForCurrentOS
        shell: bash
      - name: Upload deb artifact file to workflow run results
        uses: actions/upload-artifact@v2
        if: hashFiles('desktop-app/build/compose/binaries/main/deb/minigames_1.0.0-1_amd64.deb') != ''
        with:
          name: MiniGames-1.0.0.deb
          path: desktop-app/build/compose/binaries/main/deb/minigames_1.0.0-1_amd64.deb
      - name: Upload linux jar artifact file to workflow run results
        uses: actions/upload-artifact@v2
        if: hashFiles('desktop-app/build/compose/jars/MiniGames-linux-x64-1.0.0.jar') != ''
        with:
          name: MiniGames-Linux-1.0.0.jar
          path: desktop-app/build/compose/jars/MiniGames-linux-x64-1.0.0.jar
      - name: Upload msi artifact file to workflow run results
        uses: actions/upload-artifact@v2
        if: hashFiles('desktop-app/build/compose/binaries/main/msi/MiniGames-1.0.0.msi') != ''
        with:
          name: MiniGames-1.0.0.msi
          path: desktop-app/build/compose/binaries/main/msi/MiniGames-1.0.0.msi
      - name: Release deb artifact file
        uses: "marvinpinto/action-automatic-releases@latest"
        if: hashFiles('desktop-app/build/compose/binaries/main/deb/minigames_1.0.0-1_amd64.deb') != ''
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "MiniGames-1.0.0.deb"
          files: desktop-app/build/compose/binaries/main/deb/minigames_1.0.0-1_amd64.deb
      - name: Release linux jar artifact file
        uses: "marvinpinto/action-automatic-releases@latest"
        if: hashFiles('desktop-app/build/compose/jars/MiniGames-linux-x64-1.0.0.jar') != ''
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "MiniGames-Linux-1.0.0.jar"
          files: desktop-app/build/compose/jars/MiniGames-linux-x64-1.0.0.jar
      - name: Release msi artifact file
        uses: "marvinpinto/action-automatic-releases@latest"
        if: hashFiles('desktop-app/build/compose/binaries/main/msi/MiniGames-1.0.0.msi') != ''
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          automatic_release_tag: "MiniGames-1.0.0.msi"
          files: desktop-app/build/compose/binaries/main/msi/MiniGames-1.0.0.msi
